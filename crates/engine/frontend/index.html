<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Engine Technical Terminal</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Time-series & Financial Chart.js dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.2.1/dist/chartjs-chart-financial.js"></script>
    
    <!-- Local separated stylesheet -->
    <link rel="stylesheet" href="/styles.css">
</head>
<body class="bg-[#0b0e14] text-slate-100 font-sans min-h-screen">

    <!-- Header Panel (Top Bar) -->
    <header class="border-b border-slate-800 bg-[#131722]/90 backdrop-blur px-6 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-4">
            <span class="text-xl">⚡</span>
            <h1 class="text-xs font-bold tracking-widest text-slate-300 uppercase">ETHUSD Live Execution Interface</h1>
            
            <!-- Time Candles Representation added to the Top Bar -->
            <div class="px-2 py-0.5 rounded text-[10px] font-black bg-blue-500/10 text-blue-400 border border-blue-500/20 uppercase tracking-widest">
                5s
            </div>
        </div>
        
        <div id="connection-status" class="px-3 py-1 rounded text-xs font-semibold bg-red-500/10 text-red-400 border border-red-500/20 flex items-center space-x-2">
            <span class="h-2 w-2 rounded-full bg-red-500 animate-pulse"></span>
            <span>OFFLINE</span>
        </div>
    </header>

    <!-- Main Chart Container Stack (Gapped layout for clear window separation) -->
    <main class="max-w-[1500px] mx-auto p-4 flex flex-col space-y-[10px]">

        <!-- Pane 1: Price and EMAs (Candlesticks) -->
        <div class="relative h-[320px] panel-box chart-grid-bg overflow-hidden">
            <!-- Removed the "(5s Candles)" text from this local floating box label -->
            <div class="absolute top-2 left-14 z-10 bg-[#131722]/90 px-2 py-1 rounded text-xs border border-slate-800 flex space-x-4">
                <span class="font-bold text-slate-200">Price: <span id="price-lbl">--</span></span>
                <span class="text-blue-400 font-medium">EMA10: <span id="ema10-lbl">--</span></span>
                <span class="text-amber-500 font-medium">EMA50: <span id="ema50-lbl">--</span></span>
                <span class="text-rose-500 font-medium">EMA100: <span id="ema100-lbl">--</span></span>
                <span class="text-purple-500 font-medium">EMA200: <span id="ema200-lbl">--</span></span>
            </div>
            <canvas id="priceChart"></canvas>
        </div>

        <!-- Pane 2: ADX Panel -->
        <div class="relative h-[110px] panel-box chart-grid-bg overflow-hidden">
            <div class="absolute top-2 left-14 z-10 bg-[#131722]/90 px-2 py-0.5 rounded text-[10px] border border-slate-800 flex space-x-4">
                <span class="font-bold text-yellow-400">ADX (14): <span id="adx-lbl">--</span></span>
            </div>
            <canvas id="adxChart"></canvas>
        </div>

        <!-- Pane 3: RSI Panel -->
        <div class="relative h-[110px] panel-box chart-grid-bg overflow-hidden">
            <div class="absolute top-2 left-14 z-10 bg-[#131722]/90 px-2 py-0.5 rounded text-[10px] border border-slate-800 flex space-x-4">
                <span class="font-bold text-purple-400">RSI (14): <span id="rsi-lbl">--</span></span>
            </div>
            <canvas id="rsiChart"></canvas>
        </div>

        <!-- Pane 4: MACD Panel -->
        <div class="relative h-[130px] panel-box chart-grid-bg overflow-hidden">
            <div class="absolute top-2 left-14 z-10 bg-[#131722]/90 px-2 py-0.5 rounded text-[10px] border border-slate-800 flex space-x-4">
                <span class="font-bold text-slate-300">MACD (12, 26, 9)</span>
                <span class="text-blue-400">Line: <span id="macd-line-lbl">--</span></span>
                <span class="text-amber-500">Signal: <span id="macd-sig-lbl">--</span></span>
                <span class="text-teal-400">Hist: <span id="macd-hist-lbl">--</span></span>
            </div>
            <canvas id="macdChart"></canvas>
        </div>

        <!-- Pane 5: Squeeze Momentum Panel (Shows timeline labels on the bottom) -->
        <div class="relative h-[140px] panel-box chart-grid-bg overflow-hidden">
            <div class="absolute top-2 left-14 z-10 bg-[#131722]/90 px-2 py-0.5 rounded text-[10px] border border-slate-800 flex space-x-4">
                <span class="font-bold text-slate-300">Squeeze Momentum (LazyBear)</span>
                <span class="text-emerald-400">Value: <span id="sqz-val-lbl">--</span></span>
                <span id="sqz-status-lbl" class="text-slate-400">Status: Calculating</span>
            </div>
            <canvas id="squeezeChart"></canvas>
        </div>
    </main>

    <!-- Separated JavaScript files loaded sequentially -->
    <script src="/charts.js"></script>
    <script src="/app.js"></script>
</body>
</html>

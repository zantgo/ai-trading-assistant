[package]
name = "engine"
version = "0.1.0"
edition = "2021"

[dependencies]
# Import local shared workspace library containing our data structures and math
shared = { path = "../shared" }
# Tokio async runtime allowing non-blocking loop handling
tokio = { version = "1.36", features = ["full"] }
# rust_decimal is needed in the binary to instantiate price variables
rust_decimal = { version = "1.34", features = ["serde-float"] }
